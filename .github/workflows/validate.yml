name: Validate Skill

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Validate with skills-ref
        run: |
          uvx --from git+https://github.com/agentskills/agentskills#subdirectory=skills-ref \
            skills-ref validate "$PWD"

      - name: Validate repository checks
        run: uv run scripts/validate_skill.py --skip-skills-ref

      - name: Validate eval workspace preparation
        run: uv run scripts/prepare_eval.py --iteration ci
